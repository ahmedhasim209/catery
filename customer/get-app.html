    <!-- HERO -->
    <section

        text-align: center;
        padding: 64px 24px;

      <div style="max-width: 1044px; margin: 0 auto">

            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: fit-content;
            margin: 0 auto 24px;
            padding: 7px 12px;
            background: #3f1b2c;
            color: #c5e866;
            border: 1px solid #c5e866;
            border-radius: 20px;
            font-family: var(--font-body);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            line-height: 1;
          "
          >FREE DOWNLOAD</span
        >

        <!-- H1 -->
        <h1
          class="fix-text-padding"
          style="
            font-family: var(--font-brand);
            font-size: 46px;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: 0;
            color: #efece4;
            margin: 0 0 16px;
          ">
          Your Next Event Starts Here.<br />
          <span style="color: var(--color-lime)">Download Catery Free.</span>
        </h1>

        <!-- Subtitle -->
        <p
          class="fix-text-padding"
          style="
            font-family: var(--font-body);
            font-size: 16px;
            font-weight: 400;
            line-height: 1.4;
            letter-spacing: 0;
            color: #efece4;
            opacity: 0.85;
            max-width: 560px;
            margin: 0 auto 40px;
          ">
          Browse verified caterers, compare menus and prices, and book — all
          from one free app.
        </p>

        <!-- 3 phone mockups — circular slide-position loop -->
        <style>
          /* 3 stops, 4s pause + 0.8s slide each = 14.4s per full lap */
          @keyframes phoneOrbit {
            0% {
              transform: translate(calc(-50% - 260px), -50%) scale(0.85);
              z-index: 1;
            }
            27.7% {
              transform: translate(calc(-50% - 260px), -50%) scale(0.85);
              z-index: 1;
            }
            33.33% {
              transform: translate(-50%, -50%) scale(1);
              z-index: 2;
            }
            61.1% {
              transform: translate(-50%, -50%) scale(1);
              z-index: 2;
            }
            66.67% {
              transform: translate(calc(-50% + 260px), -50%) scale(0.85);
              z-index: 1;
            }
            94.4% {
              transform: translate(calc(-50% + 260px), -50%) scale(0.85);
              z-index: 1;
            }
            100% {
              transform: translate(calc(-50% - 260px), -50%) scale(0.85);
              z-index: 1;
            }
          }
          .phone-orbit {
            position: relative;
            height: 520px;
            margin: 0 auto 32px;
          }
          .phone-orbit img {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 240px;
            height: auto;
            transform-origin: center center;
            animation: phoneOrbit 14.4s ease-in-out infinite;
          }
        </style>
        <div class="phone-orbit">
          <!-- starts left -->
          <img
            src="/assets/images/get-the-app-customer/left-phone.svg"
            alt="App screenshot"
            style="animation-delay: 0s" />
          <!-- starts center -->
          <img
            src="/assets/images/get-the-app-customer/main-phone.svg"
            alt="App screenshot"
            style="animation-delay: -4.8s" />
          <!-- starts right -->
          <img
            src="/assets/images/get-the-app-customer/right-phone.svg"
            alt="App screenshot"
            style="animation-delay: -9.6s" />
        </div>

      @media (max-width: 768px) {
        /* Phone orbit — side phones peek from screen edges */

          0% {

            z-index: 1;
          }
          27.7% {
            transform: translate(calc(-50% - 215px), -50%) scale(0.82);
            z-index: 1;
          }
          33.33% {
            transform: translate(-50%, -50%) scale(1);
            z-index: 2;
          }
          61.1% {
            transform: translate(-50%, -50%) scale(1);
            z-index: 2;
          }
          66.67% {

          }

            z-index: 1;
          }
        }
        .fix-padding {
          padding: 64px 0 !important;
        }
        .fix-text-padding {
          padding: 0 24px;
        }
        .phone-orbit {
          height: 400px !important;
          overflow: hidden !important;
        }
        .phone-orbit img {
          width: 180px !important;
        }

        /* QR code — bigger on mobile */
        .qr-wrapper {
          width: 270px !important;
          height: 270px !important;
          border-radius: 24px !important;
          padding: 16px !important;
        }
