<!-- @format -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CSS files -->
    <link rel="stylesheet" href="css/gate-splash.css" />
    <!-- fontawesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet" />
    <title>catery</title>
  </head>
  <body>
    <main>
      <div class="container">
        <div class="splash-gate">
          <div class="splash-heading">
            <h1>Welcome to Catery</h1>
            <h3>Tell us how you'd like to get started.</h3>
          </div>
          <div class="splash-paths">
            <div class="customer-path" onclick="window.location='/customer/index.html'" style="cursor:pointer;">
              <h5>FOR CUSTOMERS</h5>
              <svg
                color="#5C2839"
                xmlns="http://www.w3.org/2000/svg"
                width="48px"
                height="48px"
                viewBox="0 0 24 24">
                <path d="M0 0h24v24H0z" fill="none" />
                <path
                  fill="currentColor"
                  d="M19 19H5V8h14m-3-7v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14a2 2 0 0 0 2 2h14c1.11 0 2-.89 2-2V5a2 2 0 0 0-2-2h-1V1m-7.12 11H7.27l2.92 2.11l-1.11 3.45L12 15.43l2.92 2.13l-1.12-3.44L16.72 12h-3.6L12 8.56z" />
              </svg>
              <h3>I'm Planning an Event</h3>
              <h6>Find and book catering services for any occasion.</h6>
            </div>
            <div class="vendor-path" onclick="window.location='/vendors/index.html'" style="cursor:pointer;">
              <h5>FOR VENDORS</h5>
              <svg
                color="#EFECE4"
                xmlns="http://www.w3.org/2000/svg"
                width="48px"
                height="48px"
                viewBox="0 0 24 24">
                <path d="M0 0h24v24H0z" fill="none" />
                <path
                  fill="currentColor"
                  d="M1.975 11q-.425 0-.7-.288T1 10t.288-.712T2 9h1.475q.85-2.425 2.863-4.05T11 3.025V3q0-.425.288-.712T12 2t.713.288T13 3v.025q2.625.3 4.638 1.925T20.5 9H22q.425 0 .713.288T23 10t-.288.713T22 11zM8 21v-8h6.8q.35 0 .6.2t.35.475t.038.575t-.338.525L13.975 16H10.75q-.325 0-.537.225T10 16.75q0 .325.213.538t.512.212h3.05q.35 0 .688-.112t.612-.338l3.475-2.9q.55-.4 1.163-.5t1.212.05t1.138.513t.912.937L17.1 20.075q-.55.45-1.2.688T14.55 21zm-5 1q-.425 0-.712-.288T2 21v-7q0-.425.288-.712T3 13h3v8q0 .425-.288.713T5 22z" />
              </svg>
              <h3>I run a Catering Business</h3>
              <h6>Showcase your services and connect with customers.</h6>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
