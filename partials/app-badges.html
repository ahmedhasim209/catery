<!-- @format -->
<!-- Shared app-download badges — App Store + Google Play -->
<!-- App Store -->
<a
  href="#"
  style="
    display: inline-flex;
    align-items: center;
    gap: 8px;
    height: 48px;
    padding: 8px 12px;
    background: #ffffff;
    border: 1.5px solid #000000;
    border-radius: 6px;
    text-decoration: none;
    width: fit-content;
    box-sizing: border-box;
  ">
  <i class="fa-brands fa-apple" style="font-size: 1.8rem; color: #000"></i>
  <span style="display: flex; flex-direction: column">
    <span
      style="
        font-family: 'SF Compact Text', -apple-system, 'Helvetica Neue', sans-serif;
        font-size: 9px;
        font-weight: 500;
        color: #000000;
        letter-spacing: 0;
        line-height: 9px;
      "
      >Download on the</span
    >
    <span
      style="
        font-family: 'SF Compact Display', -apple-system, 'Helvetica Neue', sans-serif;
        font-size: 18px;
        font-weight: 500;
        color: #000000;
        letter-spacing: -0.47px;
        line-height: 1;
      "
      >App Store</span
    >
  </span>
</a>
